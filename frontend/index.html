<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Estoque - Mini Mercado</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #121a2b;
        --text: #e7eefc;
        --muted: #a9b7d0;
        --primary: #6ea8fe;
        --danger: #ff6b6b;
        --ok: #51cf66;
        --border: rgba(255,255,255,.10);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(110,168,254,.25), transparent 60%),
                    radial-gradient(900px 700px at 90% 30%, rgba(81,207,102,.18), transparent 55%),
                    var(--bg);
        color: var(--text);
      }
      a { color: inherit; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 60px; }
      header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 18px; }
      header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; color: var(--muted); }
      nav { display:flex; gap: 10px; flex-wrap: wrap; }
      .pill {
        border: 1px solid var(--border);
        background: rgba(255,255,255,.04);
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
      }
      .pill.active { border-color: rgba(110,168,254,.55); background: rgba(110,168,254,.10); }
      .grid { display:grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 880px) { .grid { grid-template-columns: 1.1fr .9fr; } }
      .card {
        background: rgba(18,26,43,.72);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        backdrop-filter: blur(10px);
      }
      .title { margin: 0 0 10px; font-size: 18px; }
      .sub { margin: 0 0 16px; color: var(--muted); font-size: 14px; line-height: 1.4; }
      form { display:grid; gap: 12px; }
      label { display:grid; gap: 6px; font-size: 13px; color: var(--muted); }
      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,.03);
        color: var(--text);
        outline: none;
      }
      input:focus { border-color: rgba(110,168,254,.6); box-shadow: 0 0 0 3px rgba(110,168,254,.12); }
      .row { display:grid; grid-template-columns: 1fr; gap: 12px; }
      @media (min-width: 520px) { .row { grid-template-columns: 1fr 1fr; } }
      .btn {
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(110,168,254,.55);
        background: rgba(110,168,254,.15);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
      }
      .btn.secondary {
        border-color: var(--border);
        background: rgba(255,255,255,.04);
        font-weight: 600;
      }
      .btn:disabled { opacity: .6; cursor: not-allowed; }
      .msg { padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,.03); }
      .msg.ok { border-color: rgba(81,207,102,.5); background: rgba(81,207,102,.10); }
      .msg.err { border-color: rgba(255,107,107,.5); background: rgba(255,107,107,.10); }
      code.kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; font-size: 12px; color: var(--muted); }
      .small { font-size: 13px; color: var(--muted); line-height: 1.45; }
      .tokenBox { word-break: break-all; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; font-size: 12px; color: #dbe7ff; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 18 (UMD) + Babel (para JSX sem build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" src="./app.js"></script>
  </body>
</html>
