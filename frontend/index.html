<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Estoque - Mini Mercado</title>
    <style>
      :root {
        --bg: #070a16;
        --card: rgba(15, 24, 42, 0.82);
        --text: #edf2ff;
        --muted: #9aa3bb;
        --primary: #72ff7f;
        --primary-strong: #20e995;
        --border: rgba(255,255,255,0.09);
        --glass: rgba(255,255,255,0.08);
        --shadow: 0 32px 80px rgba(0,0,0,0.25);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, rgba(114,255,127,0.18), transparent 24%),
                    radial-gradient(circle at 85% 10%, rgba(63,168,255,0.16), transparent 20%),
                    radial-gradient(circle at 20% 80%, rgba(51,102,255,0.08), transparent 18%),
                    linear-gradient(180deg, #080b14 0%, #04060c 100%);
      }
      a { color: inherit; text-decoration: none; }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(90deg, rgba(114,255,127,0.08) 1px, transparent 1px),
          linear-gradient(rgba(63,168,255,0.08) 1px, transparent 1px);
        background-size: 200px 200px;
        opacity: 0.18;
        pointer-events: none;
      }
      .wrap {
        position: relative;
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }
      .page-head {
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
        margin-bottom: 24px;
        text-align: center;
      }
      .brand {
        font-size: 18px;
        color: #cdd6ff;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .pill {
        min-width: 110px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        padding: 12px 16px;
        border-radius: 999px;
        cursor: pointer;
        user-select: none;
        font-size: 13px;
        color: var(--muted);
        transition: all 180ms ease;
      }
      .pill:hover { background: rgba(110,168,254,0.15); }
      .pill.active {
        color: var(--text);
        background: rgba(114,255,127,0.16);
        border-color: rgba(114,255,127,0.35);
      }
      .content-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 22px;
      }
      @media (max-width: 960px) {
        .content-grid { grid-template-columns: 1fr; }
      }
      .card {
        position: relative;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 26px;
        box-shadow: var(--shadow);
        padding: 30px;
        backdrop-filter: blur(24px);
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 40%);
        pointer-events: none;
      }
      .form-top { position: relative; z-index: 1; }
      .eyebrow {
        margin: 0 0 12px;
        display: inline-flex;
        font-size: 13px;
        color: #93a0c8;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .title {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 36px);
        line-height: 1.05;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }
      form { display: grid; gap: 16px; position: relative; z-index: 1; }
      label { display: grid; gap: 10px; font-size: 13px; color: var(--muted); }
      input {
        width: 100%;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        outline: none;
        font-size: 14px;
      }
      input::placeholder { color: rgba(255,255,255,0.5); }
      input:focus { border-color: rgba(114,255,127,0.5); box-shadow: 0 0 0 4px rgba(114,255,127,0.12); }
      .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 560px) { .row { grid-template-columns: 1fr 1fr; } }
      .btn {
        width: 100%;
        padding: 16px 22px;
        border-radius: 18px;
        border: none;
        background: linear-gradient(135deg, rgba(114,255,127,0.94), rgba(33,210,150,0.95));
        color: #07100d;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: transform 180ms ease, filter 180ms ease;
      }
      .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .panel {
        display: grid;
        gap: 18px;
        position: relative;
      }
      .panel-card {
        background: rgba(10,18,32,0.78);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 26px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.18);
        backdrop-filter: blur(20px);
      }
      .panel-card h3 {
        margin: 0 0 14px;
        font-size: 18px;
        color: #d7e1ff;
      }
      .panel-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.65; }
      .panel-button {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        cursor: pointer;
        transition: background 180ms ease, transform 180ms ease;
      }
      .panel-button:hover {
        background: rgba(255,255,255,0.08);
        transform: translateY(-1px);
      }
      .panel-button span { color: var(--muted); }
      .steps { display:flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 22px; }
      .step-circle {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display:flex;
        align-items:center;
        justify-content:center;
        background: radial-gradient(circle at 30% 30%, rgba(116,255,125,0.85), rgba(19,123,76,0.28));
        border: 1px solid rgba(114,255,127,0.35);
        box-shadow: inset 0 0 14px rgba(18,81,33,0.36), 0 10px 30px rgba(18,81,33,0.12);
        color: #effff0;
        font-size: 24px;
        font-weight: 800;
      }
      .status-bar {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 14px;
        color: #c8f9c1;
        background: rgba(114,255,127,0.1);
        border: 1px solid rgba(114,255,127,0.2);
        width: fit-content;
      }
      .status-bar svg { width: 18px; height: 18px; flex-shrink: 0; }
      .caption { font-size: 13px; color: var(--muted); }
      .helper-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top: 8px; }
      .helper-pill {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: var(--muted);
        font-size: 13px;
      }
      .code-input {
        display:flex;
        gap: 14px;
        justify-content:center;
        flex-wrap:wrap;
        margin-bottom: 22px;
      }
      .code-input div {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size: 24px;
        font-weight: 700;
        color: #effff0;
        background: radial-gradient(circle at 35% 35%, rgba(114,255,127,0.95), rgba(7,25,12,0.3));
        border: 1px solid rgba(114,255,127,0.35);
        box-shadow: inset 0 0 18px rgba(114,255,127,0.32);
      }
      .verifying {
        display:flex;
        align-items:center;
        justify-content:center;
        gap: 10px;
        color: var(--muted);
        font-size: 14px;
      }
      .verifying::before {
        content: "";
        width: 18px;
        height: 18px;
        border: 3px solid rgba(114,255,127,0.18);
        border-top-color: rgba(114,255,127,0.85);
        border-radius: 50%;
        animation: spinner 1s linear infinite;
      }
      @keyframes spinner { to { transform: rotate(360deg); } }
      .highlight { color: var(--primary); font-weight: 700; }
      .panel-card.note { display:grid; gap: 14px; }
      .panel-card.note p { margin: 0; }
      .panel-card.note strong { color: #ffffff; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 18 (UMD) + Babel (para JSX sem build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" src="./app.js"></script>
  </body>
</html>
