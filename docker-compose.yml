version: '3.8'

services:
  mysql157:
    image: mysql:8.0.29
    restart: unless-stopped
    container_name: db
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: market_management
    volumes:
      - ./.db:/var/lib/mysql

  web:
    build: .
    ports:
      - "8080:5000"
    volumes:
      - .:/app
    working_dir: /app
    command: python run.py
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
    depends_on:
      - mysql157